<!DOCTYPE html>.
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Askolperl | Ücretsiz Online Şans Oyunu</title>
    
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4346551902420368" crossorigin="anonymous"></script>
<script src="geo-manager.js" defer></script>


    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; color: #333; overflow-x: hidden; }
        
        /* Sayaç Stili */
        .live-counter-top {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #3498db;
            font-weight: bold;
            font-size: 14px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 8px;
            border-radius: 5px;
            border: 1px solid #3498db;
        }

        .container { max-width: 500px; margin: 40px auto 0 auto; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        
        /* Hareketli Objeler */
        .floater { position: fixed; font-size: 35px; z-index: 100; pointer-events: none; opacity: 0.8; }
        @keyframes floatY { 0% { transform: translateY(0); } 50% { transform: translateY(30px); } 100% { transform: translateY(0); } }
        .left-floater { top: 15%; left: 5%; animation: floatY 3s infinite ease-in-out; }
        .right-floater { top: 70%; right: 5%; animation: floatY 5s infinite ease-in-out; }

        /* Reklam Alanları */
        .ad-space { min-height: 80px; margin: 10px 0; background: #f9f9f9; border: 1px dashed #ccc; display: flex; align-items: center; justify-content: center; color: #999; font-size: 11px; }

        h1 { margin: 0 0 10px 0; font-size: 24px; color: #2c3e50; }
        #numberDisplay { font-size: 50px; font-weight: bold; color: #3498db; margin: 10px 0; }
        
        .btn { padding: 12px 25px; cursor: pointer; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; margin: 5px; transition: transform 0.2s; width: 140px; }
        .btn:hover { transform: scale(1.05); }
        .btn-alt { background: #e74c3c; }
        .btn-ust { background: #2ecc71; }

        .result-box { margin: 15px 0; font-weight: bold; min-height: 24px; font-size: 18px; }
        .seo-content { margin-top: 20px; text-align: left; padding: 10px; border-top: 1px solid #eee; font-size: 14px; }
    </style>
</head>
<body>

    <!-- Sayaç -->
    <div class="live-counter-top">
        Anlık Ziyaretçi: <span id="visitor-count">0</span>
    </div>

    <div class="floater left-floater">✨</div>
    <div class="floater right-floater">🎮</div>

    <div class="container">
        <div class="ad-space">Reklam Alanı</div>

        <h1>Askolperl</h1>
        <div id="numberDisplay">?</div>

        <div>
            <button onclick="playGame('alt')" class="btn btn-alt">ALT</button>
            <button onclick="playGame('ust')" class="btn btn-ust">ÜST</button>
        </div>

        <div id="resultText" class="result-box"></div>

        <div class="ad-space">Reklam Alanı</div>

        <div class="seo-content">
            <h2>Neden Askolperl?</h2>
            <p><strong>Askolperl</strong>, ücretsiz bir online şans oyunu simülasyonudur. Stres atmak ve şansınızı denemek için en hızlı platform!</p>
        </div>
    </div>

    <script>
        // --- OYUN MANTIĞI ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function beep(freq) {
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        let currentNum = Math.floor(Math.random() * 1000000) + 1;
        document.getElementById('numberDisplay').innerText = currentNum;

        function playGame(prediction) {
            beep(prediction === 'alt' ? 440 : 880);
            let nextNum = Math.floor(Math.random() * 1000000) + 1;
            document.getElementById('numberDisplay').innerText = nextNum;
            let result = (nextNum > currentNum) ? 'ust' : 'alt';
            if (nextNum === currentNum) result = prediction;

            let resText = document.getElementById('resultText');
            if (prediction === result) {
                resText.innerText = "Tebrikler! Doğru tahmin.";
                resText.style.color = "green";
            } else {
                resText.innerText = "Kaybettin! Sayı: " + nextNum;
                resText.style.color = "red";
            }
            currentNum = nextNum;
        }

        // --- SAYAÇ MANTIĞI ---
        setInterval(() => { fetch('/ping'); }, 5000);
        setInterval(() => {
            fetch('/active-count')
                .then(res => res.text())
                .then(data => { document.getElementById('visitor-count').innerText = data; });
        }, 3000);
    </script>
</body>
</html>
